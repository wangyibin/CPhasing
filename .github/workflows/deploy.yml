name: Documentation

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      backfill_tags:
        description: 'Optional space-separated tags to backfill with mike, e.g. "v0.3.0 v0.3.1"'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: docs
          cache: true

      - name: Configure Git user
        shell: bash
        run: |
          set -euo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git fetch --tags --force
          git fetch origin gh-pages:gh-pages || true

      - name: Deploy current ref with mike
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.backfill_tags == '' }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            pixi run -e docs mike deploy -F mkdocs_en.yml --push --update-aliases "$VERSION" latest
            pixi run -e docs mike deploy -F mkdocs_zh.yml --deploy-prefix zh --push --update-aliases "$VERSION" latest
            pixi run -e docs mike set-default -F mkdocs_en.yml --push latest
            pixi run -e docs mike set-default -F mkdocs_zh.yml --deploy-prefix zh --push latest

          else
            pixi run -e docs mike deploy -F mkdocs_en.yml --push --update-aliases dev 
            pixi run -e docs mike deploy -F mkdocs_zh.yml --deploy-prefix zh --push --update-aliases dev 
          fi

      - name: Backfill historical tags with mike
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.backfill_tags != '' }}
        shell: bash
        run: |
          set -euo pipefail

          current_ref=$(git branch --show-current)
          if [[ -z "$current_ref" ]]; then
            current_ref="main"
          fi

          latest_tag=$(git tag --list 'v*' | sort -V | tail -n 1)
          
          for tag in ${{ github.event.inputs.backfill_tags }}; do
            echo "=============================="
            echo "Backfilling $tag"
            echo "=============================="

            git rev-parse -q --verify "refs/tags/$tag" >/dev/null || {
              echo "Tag not found: $tag"
              exit 1
            }

            git checkout "$tag"

            if [[ "$tag" == "$latest_tag" ]]; then
              pixi run -e docs mike deploy -F mkdocs_en.yml --push --update-aliases "$tag" latest
              pixi run -e docs mike deploy -F mkdocs_zh.yml --deploy-prefix zh --push --update-aliases "$tag" latest
            else
              pixi run -e docs mike deploy -F mkdocs_en.yml --push "$tag"
              pixi run -e docs mike deploy -F mkdocs_zh.yml --deploy-prefix zh --push "$tag"
            fi
          done
          
          git checkout "$current_ref"


          if [[ -n "${latest_tag:-}" ]]; then
            git checkout "$latest_tag"
            pixi run -e docs mike set-default -F mkdocs_en.yml --push latest
            pixi run -e docs mike set-default -F mkdocs_zh.yml --deploy-prefix zh --push latest
            git checkout "$current_ref"
          fi




